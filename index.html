<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="description" content="GigsCourt - Find trusted local service providers">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://ik.imagekit.io/Theprimestar/icon-192.png">
    <title>GigsCourt</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Paystack -->
    <script src="https://js.paystack.co/v1/inline.js"></script>
    
    <style>
        /* Quick inline styles for splash screen only */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0f0f0f; overflow-x: hidden; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #C0392B 0%, #E67E22 100%); display: flex; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.5s ease; }
        .splash-logo { font-size: 48px; font-weight: 800; animation: bounceScale 1s ease-out; }
        .splash-logo span:first-child { color: #fff; }
        .splash-logo span:last-child { color: #FFD700; }
        @keyframes bounceScale { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.2); } 70% { transform: scale(0.95); } 100% { transform: scale(1); opacity: 1; } }
        #main-app { display: none; opacity: 0; transition: opacity 0.3s ease; }
        /* Splash screen spinner */
        .splash-spinner {
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 14px;
        }
        .spinner {
            width: 30px;
            height: 30px;
            margin: 0 auto 10px auto;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash-screen">
    <div class="splash-logo">
        <span>Gigs</span><span>Court</span>
    </div>
    <div id="splash-spinner" class="splash-spinner" style="display: none;">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>
</div>

<!-- FULL SCREEN AUTH SCREEN -->
<div id="auth-screen" class="auth-screen hidden">
    <div class="auth-container">
        <div class="auth-logo">
            <span>Gigs</span><span>Court</span>
        </div>
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Sign in to continue</p>
        
        <div class="auth-tabs">
            <button id="auth-login-tab" class="auth-tab active">Login</button>
            <button id="auth-signup-tab" class="auth-tab">Sign Up</button>
        </div>
        
        <div id="auth-login-panel" class="auth-panel active">
            <input type="email" id="login-email" placeholder="Email" class="auth-input">
            <input type="password" id="login-password" placeholder="Password" class="auth-input">
            <button id="login-btn" class="auth-btn-primary">Login</button>
            <button id="forgot-password-btn" class="auth-link">Forgot Password?</button>
        </div>
        
        <div id="auth-signup-panel" class="auth-panel">
            <input type="email" id="signup-email" placeholder="Email" class="auth-input">
            <input type="password" id="signup-password" placeholder="Password" class="auth-input">
            <input type="password" id="signup-confirm-password" placeholder="Confirm Password" class="auth-input">
            <button id="signup-btn" class="auth-btn-primary">Create Account</button>
        </div>
    </div>
</div>

<!-- FULL SCREEN ONBOARDING SCREEN -->
<div id="onboarding-screen" class="onboarding-screen hidden">
    <div class="onboarding-container">
        <div class="onboarding-header">
            <button id="onboarding-close-btn" class="onboarding-icon-btn" aria-label="Close">✕</button>
            <span id="onboarding-step-indicator" class="step-indicator">Step 1 of 5</span>
        </div>
        <div id="onboarding-content" class="onboarding-content">
            <!-- Dynamic content will be injected here -->
        </div>
        <div class="onboarding-footer">
            <button id="onboarding-back-btn" class="onboarding-btn-secondary hidden">Back</button>
            <button id="onboarding-next-btn" class="onboarding-btn-primary">Continue</button>
        </div>
    </div>
</div>

<!-- FULL SCREEN SETTINGS SCREEN -->
<div id="settings-screen" class="settings-screen hidden">
    <div class="settings-container">
        <div class="settings-header">
            <button id="settings-close-btn" class="settings-icon-btn" aria-label="Close">✕</button>
            <h2>Settings</h2>
            <div style="width: 32px;"></div>
        </div>
        <div id="settings-content" class="settings-content">
            <button id="settings-change-password-btn" class="settings-btn-primary">Change Password</button>
            <button id="settings-deactivate-btn" class="settings-btn-danger">Deactivate Account</button>
            <button id="settings-logout-btn" class="settings-btn-secondary">Logout</button>
        </div>
    </div>
</div>
    
<!-- MAIN APP CONTAINER -->
<div id="main-app">
    
    <!-- PAGE CONTAINERS -->
    <div id="home-page" class="page active">
        <div class="page-header home-header">
            <h1 class="logo"><span>Gigs</span><span>Court</span></h1>
            <div class="header-actions">
                <button id="notifications-btn" class="icon-btn" aria-label="Notifications">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                    <span id="notification-badge" class="badge hidden">0</span>
                </button>
            </div>
        </div>
        <div id="notifications-dropdown" class="notifications-dropdown hidden">
            <div class="notifications-header">
                <span>Notifications</span>
                <button id="clear-notifications">Clear all</button>
            </div>
            <div id="notifications-list" class="notifications-list">
                <div class="empty-state">No notifications yet</div>
            </div>
        </div>
        <div class="page-content">
            <!-- PULL TO REFRESH INDICATOR -->
            <div id="home-pull-indicator" class="pull-to-refresh">
                <div class="pull-spinner"></div>
                <span class="pull-text">Pull to refresh</span>
            </div>
            <div id="home-feed" class="cards-feed">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <div id="search-page" class="page">
        <div class="page-header search-header">
            <h2>Search</h2>
            <button id="search-filter-btn" class="icon-btn" aria-label="Filter">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
            </button>
        </div>
        <div class="page-content">
            <div class="search-controls">
                <input type="text" id="search-service-input" placeholder="What service do you need?" class="search-input" />
                <div class="view-toggle">
                    <button id="map-view-btn" class="toggle-btn active">Map</button>
                    <button id="list-view-btn" class="toggle-btn">List</button>
                </div>
            </div>
            <div class="radius-control">
                <label>Radius: <span id="radius-value">5</span> km</label>
                <input type="range" id="radius-slider" min="1" max="20" value="1" step="1" />
            </div>
            <div id="map-container" class="map-container"></div>
            <div id="search-list-view" class="search-list-view hidden">
                <div id="search-list-feed" class="cards-feed">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="chats-page" class="page">
        <div class="page-header chats-header">
            <h2>Messages</h2>
            <button id="new-chat-btn" class="icon-btn" aria-label="New message">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
            </button>
        </div>
        <div class="page-content">
            <div id="chats-list" class="chats-list">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <div id="profile-page" class="page">
        <div class="page-header profile-header-nav">
            <h2 id="profile-header-title">Profile</h2>
            <button id="profile-settings-btn" class="icon-btn" aria-label="Settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
            </button>
        </div>
        <div class="page-content">
            <!-- PULL TO REFRESH INDICATOR -->
            <div id="profile-pull-indicator" class="pull-to-refresh">
                <div class="pull-spinner"></div>
                <span class="pull-text">Pull to refresh</span>
            </div>
            <div id="profile-content">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <div id="admin-page" class="page">
            <div class="page-header admin-header">
                <h2>Admin Dashboard</h2>
                <button id="admin-refresh-btn" class="icon-btn" aria-label="Refresh">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6" />
                        <path d="M1 20v-6h6" />
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                    </svg>
                </button>
            </div>
            <div class="page-content">
                <div id="admin-content">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    
    <nav id="bottom-nav" class="bottom-nav">
        <button class="nav-item active" data-page="home">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H9v8H5a2 2 0 0 1-2-2z" />
            </svg>
            <span>Home</span>
        </button>
        <button class="nav-item" data-page="search">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
            </svg>
            <span>Search</span>
        </button>
        <button class="nav-item" data-page="chats">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            <span>Chats</span>
        </button>
        <button class="nav-item" data-page="profile">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
            <span>Profile</span>
        </button>
        <button class="nav-item admin-only hidden" data-page="admin" id="admin-tab">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 15v2m-6 4h12a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2zm10-10V7a4 4 0 0 0-8 0v4h8z" />
            </svg>
            <span>Admin</span>
        </button>
    </nav>

    <div id="bottom-sheet" class="bottom-sheet hidden">
        <div class="sheet-drag-handle"></div>
        <div class="sheet-content" id="sheet-content"></div>
    </div>
    <div id="sheet-overlay" class="sheet-overlay hidden"></div>

    <div id="toast-container" class="toast-container"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ImageKit Uploader -->
<script src="https://cdn.jsdelivr.net/npm/ik-imagekit@latest/dist/ik-imagekit.min.js"></script>

<!-- Firebase Config -->
<script src="firebase-config.js"></script>

<!-- Core App -->
<script src="app-core.js" type="module"></script>

<!-- Features App -->
<script src="app-features.js" type="module"></script>

<!-- FCM Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/firebase-messaging-sw.js')
        .then((registration) => {
            console.log('Service Worker registered successfully:', registration);
        })
        .catch((error) => {
            console.error('Service Worker registration failed:', error);
        });
}
</script> 

    <script>
(function() {
    console.log('Splash hide script started');
    
    // Method 1: Check interval
    var check = setInterval(function() {
        var splash = document.getElementById('splash-screen');
        var user = window.auth && window.auth.currentUser;
        
        if (user && splash) {
            splash.style.display = 'none';
            clearInterval(check);
            console.log('✅ Splash hidden via interval');
        }
    }, 200);
    
    // Method 2: Listen for auth state change
    if (window.auth) {
        window.auth.onAuthStateChanged(function(user) {
            if (user) {
                var splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.style.display = 'none';
                    clearInterval(check);
                    console.log('✅ Splash hidden via onAuthStateChanged');
                }
            }
        });
    }
    
    // Stop interval after 30 seconds
    setTimeout(function() { 
        clearInterval(check); 
    }, 30000);
})();
</script>
    
</body>
</html>
