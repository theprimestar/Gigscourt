<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="description" content="GigsCourt - Find trusted local service providers">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://ik.imagekit.io/Theprimestar/icon-192.png">
    <title>GigsCourt</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Paystack -->
    <script src="https://js.paystack.co/v1/inline.js"></script>
    
    <style>
        /* Quick inline styles for splash screen only */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0f0f0f; overflow-x: hidden; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #C0392B 0%, #E67E22 100%); display: flex; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.5s ease; }
        .splash-logo { font-size: 48px; font-weight: 800; animation: bounceScale 1s ease-out; }
        .splash-logo span:first-child { color: #fff; }
        .splash-logo span:last-child { color: #FFD700; }
        @keyframes bounceScale { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.2); } 70% { transform: scale(0.95); } 100% { transform: scale(1); opacity: 1; } }
        #main-app { display: none; opacity: 0; transition: opacity 0.3s ease; }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash-screen">
    <div class="splash-logo">
        <span>Gigs</span><span>Court</span>
    </div>
</div>

<!-- MAIN APP CONTAINER -->
<div id="main-app">

    <!-- SHRINKING HEADER -->
    <header id="app-header">
        <div class="header-inner">
            <h1 class="logo"><span>Gigs</span><span>Court</span></h1>
            <div class="header-actions">
                <button id="notifications-btn" class="icon-btn" aria-label="Notifications">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                    <span id="notification-badge" class="badge hidden">0</span>
                </button>
            </div>
        </div>
        <div id="notifications-dropdown" class="notifications-dropdown hidden">
            <div class="notifications-header">
                <span>Notifications</span>
                <button id="clear-notifications">Clear all</button>
            </div>
            <div id="notifications-list" class="notifications-list">
                <div class="empty-state">No notifications yet</div>
            </div>
        </div>
    </header>

    <!-- PAGE CONTAINERS -->
    <main id="page-container">
        <div id="home-page" class="page active">
            <div class="page-content">
                <div class="search-bar-container">
                    <input type="text" id="home-search" placeholder="Search services..." class="search-input" />
                </div>
                <div id="home-feed" class="cards-feed">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>

        <div id="search-page" class="page">
            <div class="page-content">
                <div class="search-controls">
                    <input type="text" id="search-service-input" placeholder="What service do you need?" class="search-input" />
                    <div class="view-toggle">
                        <button id="map-view-btn" class="toggle-btn active">Map</button>
                        <button id="list-view-btn" class="toggle-btn">List</button>
                    </div>
                </div>
                <div class="radius-control">
                    <label>Radius: <span id="radius-value">5</span> km</label>
                    <input type="range" id="radius-slider" min="1" max="50" value="5" step="1" />
                </div>
                <div id="map-container" class="map-container"></div>
                <div id="search-list-view" class="search-list-view hidden">
                    <div id="search-list-feed" class="cards-feed">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="chats-page" class="page">
            <div class="page-content">
                <div class="chats-header">
                    <h2>Messages</h2>
                    <button id="new-chat-btn" class="icon-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg>
                    </button>
                </div>
                <div id="chats-list" class="chats-list">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>

        <div id="profile-page" class="page">
            <div class="page-content">
                <div id="profile-content">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <nav id="bottom-nav" class="bottom-nav">
        <button class="nav-item active" data-page="home">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H9v8H5a2 2 0 0 1-2-2z" />
            </svg>
            <span>Home</span>
        </button>
        <button class="nav-item" data-page="search">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
            </svg>
            <span>Search</span>
        </button>
        <button class="nav-item" data-page="chats">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            <span>Chats</span>
        </button>
        <button class="nav-item" data-page="profile">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
            <span>Profile</span>
        </button>
    </nav>

    <<div id="bottom-sheet" class="bottom-sheet hidden">
    <div class="sheet-drag-handle"></div>
    <div class="sheet-content" id="sheet-content"></div>
</div>
    <div id="sheet-overlay" class="sheet-overlay hidden"></div>

    <div id="toast-container" class="toast-container"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ImageKit Uploader -->
<script src="https://cdn.jsdelivr.net/npm/ik-imagekit@latest/dist/ik-imagekit.min.js"></script>

<!-- Firebase Config -->
<script src="firebase-config.js"></script>

<!-- Core App -->
<script src="app-core.js" type="module"></script>

<!-- Features App -->
<script src="app-features.js" type="module"></script>

</body>
</html>
