<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GigsCourt</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="theme-color" content="#CC5500">
</head>
<body>
    <div id="app"></div>
    
    <!-- Load helpers first -->
    <script src="utils/helpers.js"></script>
    
    <!-- Firebase SDK - Load as module -->
    <script type="module">
        // Import Firebase services
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.8.0/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/11.8.0/firebase-auth.js';
        import { getFirestore } from 'https://www.gstatic.com/firebasejs/11.8.0/firebase-firestore.js';
        
        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAqvDHUPuGtZGMephb3dN_31eruuBXnbFE",
            authDomain: "gigscourt2.firebaseapp.com",
            projectId: "gigscourt2",
            storageBucket: "gigscourt2.firebasestorage.app",
            messagingSenderId: "505136313803",
            appId: "1:505136313803:web:2b61e6916efdaf8723324e"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Make auth and db available to all pages
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseSignIn = signInWithEmailAndPassword;
        window.firebaseSignUp = createUserWithEmailAndPassword;
        
        console.log('✅ Firebase initialized');
        
        // Load the main app router
        const script = document.createElement('script');
        script.src = 'app.js';
        document.body.appendChild(script);
    </script>
</body>
</html>
