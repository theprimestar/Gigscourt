<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GigsCourt Admin Panel</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        /* Admin-specific styles */
        .admin-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 80px;
        }
        
        .admin-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-glass);
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-burnt-orange);
        }
        
        .dispute-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-glass);
            cursor: pointer;
        }
        
        .dispute-item:hover {
            background: var(--bg-primary);
        }
        
        .broadcast-area {
            margin-top: 16px;
        }
        
        textarea, input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            margin-bottom: 12px;
        }
        
        .admin-tab-bar {
            display: flex;
            gap: 4px;
            background: var(--bg-glass);
            border-radius: 60px;
            padding: 4px;
            margin-bottom: 20px;
        }
        
        .admin-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .admin-tab.active {
            background: var(--accent-burnt-orange);
            color: white;
        }
        
        .back-to-app {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-shield-alt" style="color: var(--accent-modern-red);"></i> Admin Panel</h1>
            <div id="admin-status" style="font-size: 12px; color: var(--accent-burnt-orange);">
                <i class="fas fa-circle" style="font-size: 8px;"></i> Admin Mode
            </div>
        </div>
        
        <!-- Admin Tab Bar -->
        <div class="admin-tab-bar">
            <div class="admin-tab active" data-tab="stats">📊 Stats</div>
            <div class="admin-tab" data-tab="disputes">⚖️ Disputes</div>
            <div class="admin-tab" data-tab="broadcast">📢 Broadcast</div>
            <div class="admin-tab" data-tab="users">👥 Users</div>
        </div>
        
        <!-- Stats Tab -->
        <div id="stats-tab" class="admin-tab-content">
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-users">-</div>
                    <div>Total Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-gigs">-</div>
                    <div>Total Gigs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-messages">-</div>
                    <div>Messages</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="monthly-revenue">₦-</div>
                    <div>Revenue (MTD)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="active-users">-</div>
                    <div>Active (24h)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-credits">-</div>
                    <div>Credits Used</div>
                </div>
            </div>
            <button id="refresh-stats" class="btn-burnt-orange" style="width: 100%;">Refresh Stats</button>
        </div>
        
        <!-- Disputes Tab -->
        <div id="disputes-tab" class="admin-tab-content" style="display: none;">
            <div class="admin-card">
                <h3>Recent Disputes</h3>
                <div id="disputes-list" style="margin-top: 16px;">
                    <div class="loading">Loading disputes...</div>
                </div>
            </div>
        </div>
        
        <!-- Broadcast Tab -->
        <div id="broadcast-tab" class="admin-tab-content" style="display: none;">
            <div class="admin-card">
                <h3>Send Broadcast Notification</h3>
                <div class="broadcast-area">
                    <input type="text" id="broadcast-title" placeholder="Notification Title">
                    <textarea id="broadcast-body" rows="3" placeholder="Notification Message..."></textarea>
                    <button id="send-broadcast" class="btn-burnt-orange" style="width: 100%;">Send to All Users</button>
                </div>
            </div>
        </div>
        
        <!-- Users Tab -->
        <div id="users-tab" class="admin-tab-content" style="display: none;">
            <div class="admin-card">
                <h3>Manage Users</h3>
                <input type="text" id="search-user" placeholder="Search by email or name...">
                <div id="users-list" style="margin-top: 16px; max-height: 400px; overflow-y: auto;">
                    <div class="loading">Loading users...</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="back-to-app" id="back-to-app">
        <i class="fas fa-arrow-left"></i> Back to App
    </div>
    
    <script src="../lib/supabase.js"></script>
    <script src="admin.js"></script>
</body>
</html>
