<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">
            <span class="gigs">Gigs</span><span class="court">Court</span>
        </h1>
        
        <input type="email" id="signup-email" class="input-premium" placeholder="Email" autocomplete="email">
        <input type="password" id="signup-password" class="input-premium" placeholder="Password" autocomplete="new-password">
        
        <button id="signup-btn" class="btn-premium">Create Account</button>
        
        <p class="auth-footer">
            Already have an account? <a href="#" id="goto-login" class="link-premium">Login</a>
        </p>
    </div>
</div>
