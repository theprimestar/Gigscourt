<div class="onboarding-container">
    <div class="onboarding-card">
        <h2 class="onboarding-subtitle">Tell us about yourself</h2>
        
        <input type="text" id="display-name" class="input-premium" placeholder="Display name *" required>
        <input type="tel" id="phone-number" class="input-premium" placeholder="Phone number *" required>
        
        <button id="upload-photo" class="btn-secondary">Add Profile Picture (optional)</button>
        <input type="file" id="photo-input" accept="image/*" style="display:none">
        
        <button id="account-continue" class="btn-premium">Continue</button>
    </div>
</div>
