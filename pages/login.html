<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">
            <span class="gigs">Gigs</span><span class="court">Court</span>
        </h1>
        
        <input type="email" id="login-email" class="input-premium" placeholder="Email" autocomplete="email">
        <input type="password" id="login-password" class="input-premium" placeholder="Password" autocomplete="current-password">
        
        <button id="login-btn" class="btn-premium">Login</button>
        
        <p class="auth-footer">
            No account? <a href="#" id="goto-signup" class="link-premium">Create Account</a>
        </p>
    </div>
</div>
